<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mordev Master Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --brand-primary: #7C3AED; }
        body { background: #0A0B0F; font-family: 'Outfit', sans-serif; color: white; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .card { background: #12131A; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: rgba(255,255,255,0.4); font-size: 13px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-active { background: rgba(0,224,150,0.1); color: #00E096; }
        .status-inactive { background: rgba(255,77,109,0.1); color: #FF4D6D; }
        .btn { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--brand-primary); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 10px; width: 100%; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="font-size: 32px; font-weight: 800; letter-spacing: -1px;">Mordev <span style="color:var(--brand-primary)">Master</span></h1>
                <p style="color:rgba(255,255,255,0.5)">Gestión de Socios Comerciales y Liquidaciones</p>
            </div>
            <button class="btn btn-primary" onclick="showAddVendor()">
                <span class="material-icons-round">person_add</span> Nuevo Socio
            </button>
        </div>

        <div class="grid">
            <!-- LISTA DE VENDEDORES -->
            <div class="card" style="grid-column: span 2;">
                <h3 style="display:flex; align-items:center; gap:8px;"><span class="material-icons-round">group</span> Socios Comerciales</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Código</th>
                            <th>Email</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="vendedoresBody">
                        <!-- JS -->
                    </tbody>
                </table>
            </div>

            <!-- LIQUIDACIONES DEL MES -->
            <div class="card" style="grid-column: span 2;">
                <h3 style="display:flex; align-items:center; gap:8px;"><span class="material-icons-round">payments</span> Liquidaciones Pendientes (Corte Actual)</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Socio</th>
                            <th>Negocios Activos</th>
                            <th>Ingresos Estimados</th>
                            <th>Comisión (20%)</th>
                        </tr>
                    </thead>
                    <tbody id="liquidacionesBody">
                        <!-- JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL AGREGAR SOCIO -->
    <div id="vendorModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); align-items:center; justify-content:center; z-index:100;">
        <div class="card" style="width:400px;">
            <h2 id="modalTitle">Nuevo Socio Comercial</h2>
            <div style="margin-top:20px;">
                <label style="font-size:12px; color:rgba(255,255,255,0.4)">Nombre Completo</label>
                <input type="text" id="vName" placeholder="Ej: Juan Perez">
                
                <label style="font-size:12px; color:rgba(255,255,255,0.4); margin-top:15px; display:block">Correo Electrónico</label>
                <input type="email" id="vEmail" placeholder="juan@correo.com">

                <label style="font-size:12px; color:rgba(255,255,255,0.4); margin-top:15px; display:block">Código de Referido (Opcional)</label>
                <input type="text" id="vCode" placeholder="Dejar vacío para auto-generar">
            </div>
            <div style="display:flex; gap:10px; margin-top:30px;">
                <button class="btn" style="flex:1; background:rgba(255,255,255,0.1); color:white;" onclick="closeVendorModal()">Cancelar</button>
                <button class="btn btn-primary" style="flex:1;" onclick="saveVendor()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            const [vendRes, liqRes] = await Promise.all([
                fetch('/api/master/vendedores'),
                fetch('/api/master/liquidaciones')
            ]);
            const vends = await vendRes.json();
            const liqs = await liqRes.json();

            // Render Vendedores
            document.getElementById('vendedoresBody').innerHTML = vends.map(v => `
                <tr>
                    <td><strong>${v.nombre}</strong></td>
                    <td><code style="background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:6px;color:var(--brand-primary)">${v.codigo_referido}</code></td>
                    <td>${v.email || '—'}</td>
                    <td><span class="status-pill ${v.activo ? 'status-active' : 'status-inactive'}">${v.activo ? 'Activo' : 'Inactivo'}</span></td>
                    <td>
                        <button class="btn btn-sm" style="background:rgba(255,255,255,0.05); color:white;" onclick="toggleVendor('${v.id}', ${v.activo})">
                            ${v.activo ? 'Desactivar' : 'Activar'}
                        </button>
                    </td>
                </tr>
            `).join('');

            // Render Liquidaciones
            document.getElementById('liquidacionesBody').innerHTML = liqs.map(l => `
                <tr>
                    <td><strong>${l.nombre_vendedor}</strong></td>
                    <td>${l.negocios_activos_mes}</td>
                    <td>COP ${l.ingresos_brutos_mes.toLocaleString()}</td>
                    <td><strong style="color:#00E096">COP ${l.comision_a_pagar.toLocaleString()}</strong></td>
                </tr>
            `).join('');
        }

        function showAddVendor() { document.getElementById('vendorModal').style.display = 'flex'; }
        function closeVendorModal() { document.getElementById('vendorModal').style.display = 'none'; }

        async function saveVendor() {
            const body = {
                nombre: document.getElementById('vName').value,
                email: document.getElementById('vEmail').value,
                codigo_referido: document.getElementById('vCode').value
            };
            await fetch('/api/master/vendedores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            closeVendorModal();
            loadData();
        }

        async function toggleVendor(id, current) {
            await fetch(`/api/master/vendedores/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ activo: !current })
            });
            loadData();
        }

        loadData();
    </script>
</body>
</html>
